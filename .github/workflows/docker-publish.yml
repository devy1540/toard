name: docker-publish

# main push 또는 v* 태그(릴리스) 시 서버 이미지 2종을 GHCR 에 빌드·푸시.
#   ghcr.io/<owner>/toard          (runner  — Next.js standalone)
#   ghcr.io/<owner>/toard-migrate  (migrator — 마이그레이션·시드)
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: runner
            image: toard
          - target: migrator
            image: toard-migrate
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 태그·라벨 메타
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 빌드·푸시 (${{ matrix.target }})
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          # arm64 도 필요하면: platforms 에 linux/arm64 추가 + 아래를 checkout 다음에 삽입
          #   - uses: docker/setup-qemu-action@v3
          # (에뮬레이션은 느림 — 빠르게 하려면 ubuntu-24.04-arm 러너로 arch 분리 빌드)
