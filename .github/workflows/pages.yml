name: Deploy landing to Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/gen-demo-data.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # seed:demo 로직을 재현해 데모 데이터·날짜를 배포 시점 기준으로 새로 굽는다 (의존성 없음).
      - run: node scripts/gen-demo-data.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
