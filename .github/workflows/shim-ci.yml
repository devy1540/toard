name: shim-ci

# shim 변경 PR/push 검증 — 릴리스 빌드(5-플랫폼)는 shim-release.yml 이 v* 태그에서 수행.
# fmt·clippy(-D warnings)·test·release build 와 설치 스크립트 문법 검사를 미리 잡는다.
# Windows 는 별도 잡 — cfg(windows) 경로의 컴파일·테스트 회귀를 PR 단계에서 잡는다.
on:
  pull_request:
    paths:
      - "shim/**"
      - "npm/**"
      - "apps/web/lib/powershell-installer.ts"
      - "apps/web/lib/shell-installer.ts"
      - "apps/web/lib/shell-uninstaller.ts"
      - "apps/web/app/install.sh/**"
      - "apps/web/app/install.ps1/**"
      - "apps/web/app/uninstall.sh/**"
      - "apps/web/app/uninstall.ps1/**"
      - ".github/scripts/**"
      - "fixtures/usage-event.golden.json" # UsageEvent 계약 미러 테스트 (§5.6)
      - ".github/workflows/shim-ci.yml"
  push:
    branches: [main]
    paths:
      - "shim/**"
      - "npm/**"
      - "apps/web/lib/powershell-installer.ts"
      - "apps/web/lib/shell-installer.ts"
      - "apps/web/lib/shell-uninstaller.ts"
      - "apps/web/app/install.sh/**"
      - "apps/web/app/install.ps1/**"
      - "apps/web/app/uninstall.sh/**"
      - "apps/web/app/uninstall.ps1/**"
      - ".github/scripts/**"
      - "fixtures/usage-event.golden.json"
      - ".github/workflows/shim-ci.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shim/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: shim/rust
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test
      - name: build (release)
        run: cargo build --release
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
      - uses: pnpm/action-setup@v4
      - name: install workspace dependencies
        working-directory: ${{ github.workspace }}
        run: pnpm --config.enable-global-virtual-store=false install --frozen-lockfile
      - name: ensure cron fallback is available
        working-directory: ${{ github.workspace }}
        run: command -v crontab || (sudo apt-get update && sudo apt-get install -y cron)
      - name: installer E2E (Linux)
        working-directory: ${{ github.workspace }}
        env:
          TOARD_E2E_DAEMON: "1"
        run: .github/scripts/test-shim-installer-unix.sh shim/rust/target/release/shim

  check-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
      - uses: pnpm/action-setup@v4
      - name: install workspace dependencies
        run: pnpm --config.enable-global-virtual-store=false install --frozen-lockfile
      - name: parse generated PowerShell installers
        shell: pwsh
        run: |
          pnpm --filter @toard/web exec tsx -e "import { writeFileSync } from 'node:fs'; import { join } from 'node:path'; import { buildPowerShellInstallScript, buildPowerShellUninstallScript } from './lib/powershell-installer.ts'; writeFileSync(join(process.env.RUNNER_TEMP, 'install.ps1'), buildPowerShellInstallScript('https://toard.example/api', false)); writeFileSync(join(process.env.RUNNER_TEMP, 'uninstall.ps1'), buildPowerShellUninstallScript('https://toard.example/api'));"
          [scriptblock]::Create((Get-Content -Raw "$env:RUNNER_TEMP/install.ps1")) | Out-Null
          [scriptblock]::Create((Get-Content -Raw "$env:RUNNER_TEMP/uninstall.ps1")) | Out-Null
          [scriptblock]::Create((Get-Content -Raw ".github/scripts/test-shim-installer-windows.ps1")) | Out-Null
      - name: test generated PowerShell installer behavior
        run: pnpm --filter @toard/web exec tsx --test lib/powershell-installer.test.ts
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: shim/rust
      - name: clippy
        working-directory: shim/rust
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        working-directory: shim/rust
        run: cargo test
      - name: build (release)
        working-directory: shim/rust
        run: cargo build --release
      - name: installer E2E (Windows)
        shell: pwsh
        run: .github/scripts/test-shim-installer-windows.ps1 -Binary shim/rust/target/release/shim.exe

  check-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
      - uses: pnpm/action-setup@v4
      - name: install workspace dependencies
        run: pnpm --config.enable-global-virtual-store=false install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: shim/rust
      - name: build (release)
        working-directory: shim/rust
        run: cargo build --release
      - name: installer E2E (macOS)
        env:
          TOARD_E2E_DAEMON: "1"
        run: .github/scripts/test-shim-installer-unix.sh shim/rust/target/release/shim

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck install.sh
        run: |
          sh -n shim/install.sh
          sh -n shim/fake-claude.sh
          sh -n .github/scripts/test-shim-installer-unix.sh
      - name: node syntax check
        run: node --check npm/bin/toard.mjs
