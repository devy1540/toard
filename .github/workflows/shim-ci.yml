name: shim-ci

# shim 변경 PR/push 검증 — 릴리스 빌드(5-플랫폼)는 shim-release.yml 이 v* 태그에서 수행.
# fmt·clippy(-D warnings)·test·release build 와 설치 스크립트 문법 검사를 미리 잡는다.
# Windows 는 별도 잡 — cfg(windows) 경로의 컴파일·테스트 회귀를 PR 단계에서 잡는다.
on:
  pull_request:
    paths:
      - "shim/**"
      - "npm/**"
      - "fixtures/usage-event.golden.json" # UsageEvent 계약 미러 테스트 (§5.6)
      - ".github/workflows/shim-ci.yml"
  push:
    branches: [main]
    paths:
      - "shim/**"
      - "npm/**"
      - "fixtures/usage-event.golden.json"
      - ".github/workflows/shim-ci.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shim/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: shim/rust
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test
      - name: build (release)
        run: cargo build --release

  check-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: shim/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: shim/rust
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test
      - name: build (release)
        run: cargo build --release

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck install.sh
        run: |
          sh -n shim/install.sh
          sh -n shim/fake-claude.sh
      - name: node syntax check
        run: node --check npm/bin/toard.mjs
