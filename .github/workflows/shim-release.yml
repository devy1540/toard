name: shim-release

# v* 태그 push 시 4-플랫폼을 각 OS 네이티브 러너에서 빌드해 GitHub Release 에 업로드.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS 는 arm 러너 하나에서 arm64 native + x64 cross (동일 SDK)
          - os: macos-latest
            targets: aarch64-apple-darwin x86_64-apple-darwin
          - os: ubuntu-latest
            targets: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            targets: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: build
        working-directory: shim/rust
        run: |
          set -eux
          mkdir -p ../../dist
          for t in ${{ matrix.targets }}; do
            rustup target add "$t"
            cargo build --release --target "$t"
            cp "target/$t/release/shim" "../../dist/toard-shim-$t"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: shim-${{ matrix.os }}
          path: dist/toard-shim-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: checksums
        run: cd dist && sha256sum toard-shim-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          make_latest: true # releases/latest 가 항상 이 릴리스를 가리키게 (install.sh 는 latest 에서 다운로드)
          files: |
            dist/toard-shim-*
            dist/SHA256SUMS
            shim/install.sh
          generate_release_notes: true

  # npm 패키지(@toard/shim) 배포 — NPM_TOKEN 시크릿이 있을 때만.
  npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: publish
        working-directory: npm
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN 미설정 — npm publish 를 건너뜁니다."
            exit 0
          fi
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
