name: shim-release

# v* 태그 push 시 4-플랫폼을 각 OS 네이티브 러너에서 빌드해 GitHub Release 에 업로드.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: build
        working-directory: shim/rust
        run: |
          cargo build --release --target ${{ matrix.target }}
          mkdir -p ../../dist
          cp "target/${{ matrix.target }}/release/shim" "../../dist/toard-shim-${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: toard-shim-${{ matrix.target }}
          path: dist/toard-shim-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: checksums
        run: cd dist && sha256sum toard-shim-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/toard-shim-*
            dist/SHA256SUMS
            shim/install.sh
          generate_release_notes: true
