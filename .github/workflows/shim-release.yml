name: shim-release

# v* 태그 push 시 5-플랫폼을 각 OS 네이티브 러너에서 빌드해 GitHub Release 에 업로드.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS 는 arm 러너 하나에서 arm64 native + x64 cross (동일 SDK)
          - os: macos-latest
            targets: aarch64-apple-darwin x86_64-apple-darwin
          - os: ubuntu-latest
            targets: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            targets: aarch64-unknown-linux-gnu
          - os: windows-latest
            targets: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: build
        working-directory: shim/rust
        # Windows 러너 기본 셸(pwsh)을 피해 전 OS 동일 스크립트 — Git Bash 사용
        shell: bash
        run: |
          set -eux
          mkdir -p ../../dist
          # 태그 버전을 바이너리에 임베드 — `toard-shim version` 이 배포 버전을 보고한다
          export TOARD_SHIM_BUILD_VERSION="${GITHUB_REF_NAME#v}"
          for t in ${{ matrix.targets }}; do
            rustup target add "$t"
            cargo build --release --target "$t"
            # Windows 바이너리는 .exe — 자산명 접미까지 유지 (update.rs asset_name 계약)
            if [ -f "target/$t/release/shim.exe" ]; then
              cp "target/$t/release/shim.exe" "../../dist/toard-shim-$t.exe"
              # Windows helper release asset: toard-shim-background-x86_64-pc-windows-msvc.exe
              cp "target/$t/release/toard-shim-background.exe" \
                "../../dist/toard-shim-background-$t.exe"
            else
              cp "target/$t/release/shim" "../../dist/toard-shim-$t"
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: shim-${{ matrix.os }}
          path: dist/toard-shim-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: checksums
        run: cd dist && sha256sum toard-shim-* > SHA256SUMS
      - name: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Immutable release 에서는 asset 을 모두 붙인 뒤 publish 해야 한다.
          # gh release create 는 asset 이 있으면 draft 생성 → asset 업로드 → publish 순서로 처리한다.
          gh release create "$GITHUB_REF_NAME" \
            dist/toard-shim-* \
            dist/SHA256SUMS \
            shim/install.sh \
            --verify-tag \
            --generate-notes \
            --latest \
            --title "$GITHUB_REF_NAME"

  # npm 패키지(@toard/shim) 배포 — NPM_TOKEN 시크릿이 있을 때만.
  npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: publish
        working-directory: npm
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN 미설정 — npm publish 를 건너뜁니다."
            exit 0
          fi
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
