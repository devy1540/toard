services:
  postgres:
    image: postgres:16-alpine
    container_name: toard-postgres-dev
    environment:
      POSTGRES_USER: toard
      POSTGRES_PASSWORD: toard
      POSTGRES_DB: toard
    ports:
      - "5432:5432"
    volumes:
      - toard-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  toard-pg:
