# toard 올인원 배포 (프로덕션). 한 방 실행 — GHCR 프리빌트 이미지를 받아 기동:
#   AUTH_SECRET=$(openssl rand -base64 33) docker compose up -d
# 소스에서 직접 빌드(미게시 변경 확인 등): 위 명령에 --build 추가
# 이미지 태그 고정(선택): TOARD_TAG=v1.2.3 (기본 latest = main 최신)
# AUTH_SECRET 는 compose 파싱 시 필수(기본값 없음) — down/logs 등에도 필요하니 .env 에 넣어두면 편함.
# 최초 admin id/pw 부트스트랩(선택):
#   BOOTSTRAP_ADMIN_EMAIL=you@corp.com BOOTSTRAP_ADMIN_PASSWORD=... \
#     docker compose --profile seed run --rm seed
# ClickHouse 모드(선택): STORAGE_BACKEND=clickhouse CLICKHOUSE_URL=http://clickhouse:8123 \
#     docker compose --profile clickhouse up -d
name: toard

x-db-url: &db-url
  DATABASE_URL: postgres://${POSTGRES_USER:-toard}:${POSTGRES_PASSWORD:-toard}@postgres:5432/${POSTGRES_DB:-toard}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-toard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toard}
      POSTGRES_DB: ${POSTGRES_DB:-toard}
    volumes:
      - toard-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-toard} -d ${POSTGRES_DB:-toard}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # 마이그레이션 + baseline 시드(providers·pricing) — app 기동 전 완료. 멱등.
  # 관리자는 여기서 만들지 않는다 → 첫 실행 시 /setup 에서 직접 생성.
  # (BOOTSTRAP_ADMIN_EMAIL/PASSWORD 를 주면 seed 가 admin 도 선생성 — headless 대안)
  migrate:
    image: ghcr.io/devy1540/toard-migrate:${TOARD_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      target: migrator
    command: ["sh", "-c", "pnpm migrate && pnpm seed"]
    environment:
      <<: *db-url
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    image: ghcr.io/devy1540/toard:${TOARD_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      target: runner
    environment:
      <<: *db-url
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET 필수 — openssl rand -base64 33 으로 생성해 env 또는 .env 로 전달}
      AUTH_TRUST_HOST: "true"
      AUTH_MODE: ${AUTH_MODE:-oauth}
      AUTH_CREDENTIALS_ENABLED: ${AUTH_CREDENTIALS_ENABLED:-true}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      CRON_SECRET: ${CRON_SECRET:-}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-postgres}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-toard}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-toard}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-toard}
      ORG_TIMEZONE: ${ORG_TIMEZONE:-UTC}
      TOARD_CONTENT_KEK_B64: ${TOARD_CONTENT_KEK_B64:-}   # 설정 시 본문 수집 활성(암호화 KEK, base64 32B)
      CONTENT_COLLECTION_DEFAULT: ${CONTENT_COLLECTION_DEFAULT:-}   # on 이면 설치 기본 opt-out(자동 켜짐), 기본 opt-in
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # 선택(profile=seed): providers·admin·비번 시드. `docker compose --profile seed run --rm seed`
  seed:
    image: ghcr.io/devy1540/toard-migrate:${TOARD_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      target: migrator
    command: ["pnpm", "seed"]
    profiles: ["seed"]
    environment:
      <<: *db-url
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # 선택(profile=clickhouse): 이벤트·집계만 CH, 메타·인증은 PG(ADR-003).
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    profiles: ["clickhouse"]
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-toard}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-toard}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-toard}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - toard-ch:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  toard-pg:
  toard-ch:
