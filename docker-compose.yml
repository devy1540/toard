# toard 올인원 배포 (프로덕션). 한 방 실행 — GHCR 프리빌트 이미지를 받아 기동:
#   AUTH_SECRET=$(openssl rand -base64 33) docker compose up -d
# 소스에서 직접 빌드(미게시 변경 확인 등): 위 명령에 --build 추가
# 이미지 태그 고정(선택): TOARD_TAG=1.2.3 (기본 latest = main 최신)
# AUTH_SECRET 는 compose 파싱 시 필수(기본값 없음) — down/logs 등에도 필요하니 .env 에 넣어두면 편함.
# 최초 admin id/pw 부트스트랩(선택):
#   BOOTSTRAP_ADMIN_EMAIL=you@corp.com BOOTSTRAP_ADMIN_PASSWORD=... \
#     docker compose --profile seed run --rm seed
# ClickHouse 모드(선택): STORAGE_BACKEND=clickhouse CLICKHOUSE_URL=http://clickhouse:8123 \
#     docker compose --profile clickhouse up -d
name: toard

x-db-url: &db-url
  DATABASE_URL: postgres://${POSTGRES_USER:-toard}:${POSTGRES_PASSWORD:-toard}@postgres:5432/${POSTGRES_DB:-toard}

services:
  postgres:
    image: postgres:16-alpine
    user: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-toard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toard}
      POSTGRES_DB: ${POSTGRES_DB:-toard}
    volumes:
      - toard-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-toard} -d ${POSTGRES_DB:-toard}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # 마이그레이션 + baseline 시드(providers·pricing) — app 기동 전 완료. 멱등.
  # 관리자는 여기서 만들지 않는다 → 첫 실행 시 /setup 에서 직접 생성.
  # (BOOTSTRAP_ADMIN_EMAIL/PASSWORD 를 주면 seed 가 admin 도 선생성 — headless 대안)
  migrate:
    image: ghcr.io/devy1540/toard-migrate:${TOARD_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      target: migrator
    command: ["sh", "-c", "pnpm migrate && pnpm seed"]
    environment:
      <<: *db-url
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    image: ghcr.io/devy1540/toard:${TOARD_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      target: runner
    environment:
      <<: *db-url
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET 필수 — openssl rand -base64 33 으로 생성해 env 또는 .env 로 전달}
      AUTH_TRUST_HOST: "true"
      AUTH_MODE: ${AUTH_MODE:-oauth}
      AUTH_CREDENTIALS_ENABLED: ${AUTH_CREDENTIALS_ENABLED:-true}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      CRON_SECRET: ${CRON_SECRET:-}
      PRICING_AUTO_SYNC: ${PRICING_AUTO_SYNC:-}   # 내장 가격 자동 동기화(기본 on, 일 1회) — off 로 끔
      TOARD_TOOL_DEPLOYMENT_EXPERIMENTAL: ${TOARD_TOOL_DEPLOYMENT_EXPERIMENTAL:-0}
      TOARD_TOOL_ROLLOUT_COORDINATOR: ${TOARD_TOOL_ROLLOUT_COORDINATOR:-1}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-postgres}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-toard}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-toard}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-toard}
      CLICKHOUSE_READ_FINAL: ${CLICKHOUSE_READ_FINAL:-} # 1/true/on 이면 CH read 에 FINAL 강제(기본 off, 중복 0 운영 기준 부하 완화)
      CLICKHOUSE_READ_ROLLUP: ${CLICKHOUSE_READ_ROLLUP:-} # deprecated alias: timezone cache guard+exact fallback으로만 이동; migration 후 unset
      CLICKHOUSE_15M_ROLLUP_COMPACTOR: ${CLICKHOUSE_15M_ROLLUP_COMPACTOR:-} # 1/true/on 이면 finalized 15분 rollup compactor 실행
      CLICKHOUSE_READ_15M_ROLLUP: ${CLICKHOUSE_READ_15M_ROLLUP:-} # 1/true/on 이면 검증 완료된 15분 rollup + raw tail 로 시계열 조회
      CLICKHOUSE_15M_V2_COMPACTOR: ${CLICKHOUSE_15M_V2_COMPACTOR:-} # 가격 provenance를 보존한 15분 기준 rollup worker(기본 on)
      CLICKHOUSE_READ_15M_V2_ROLLUP: ${CLICKHOUSE_READ_15M_V2_ROLLUP:-} # 미설정=자동 전환, 1=비상 강제 ON, 0=비상 override OFF
      CLICKHOUSE_TIMEZONE_ROLLUP_COMPACTOR: ${CLICKHOUSE_TIMEZONE_ROLLUP_COMPACTOR:-} # 활성 IANA 시간대별 1시간·1일 rollup worker(기본 on)
      CLICKHOUSE_READ_TIMEZONE_ROLLUP: ${CLICKHOUSE_READ_TIMEZONE_ROLLUP:-} # 미설정=자동 전환, 1=비상 강제 ON, 0=비상 override OFF
      CLICKHOUSE_ENFORCE_RETENTION_TTL: ${CLICKHOUSE_ENFORCE_RETENTION_TTL:-} # 자동 전환과 별도 승인: raw usage_events 물리 97일 TTL(논리 90일 + grace 7일)
      CLICKHOUSE_ROLLUP_FINALIZE_DELAY_MS: ${CLICKHOUSE_ROLLUP_FINALIZE_DELAY_MS:-} # 15분 rollup 확정 지연(ms), 기본 30분
      CLICKHOUSE_ROLLUP_MAX_BUCKETS: ${CLICKHOUSE_ROLLUP_MAX_BUCKETS:-} # compactor tick 당 최대 bucket 수, 기본 16
      ORG_TIMEZONE: ${ORG_TIMEZONE:-UTC}
      TOARD_CONTENT_KEK_B64: ${TOARD_CONTENT_KEK_B64:-}   # 설정 시 본문 수집 활성(암호화 KEK, base64 32B)
      TOARD_LEGACY_BACKUP_RETENTION_DAYS: ${TOARD_LEGACY_BACKUP_RETENTION_DAYS:-}   # legacy 0건 뒤 백업 보존일
      CONTENT_COLLECTION_DEFAULT: ${CONTENT_COLLECTION_DEFAULT:-}   # on 이면 설치 기본 opt-out(자동 켜짐), 기본 opt-in
      TOARD_UPDATER_URL: ${TOARD_UPDATER_URL:-}       # 선택: Compose updater agent 내부 URL (예: http://updater:3201)
      TOARD_UPDATER_SECRET: ${TOARD_UPDATER_SECRET:-} # 선택: app ↔ updater 공유 secret
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      # ClickHouse profile 을 쓰는 배포에서는 CH ready 이후 앱을 띄운다.
      # profile 미사용(Postgres 기본 모드)에서는 optional dependency 로만 남긴다.
      clickhouse:
        condition: service_healthy
        required: false
    restart: unless-stopped

  # 선택(profile=updater): 관리 화면에서 Compose 서버 업데이트를 실행하는 별도 agent.
  # Docker socket 권한을 갖는 고위험 서비스라 명시적으로 profile 과 secret 을 설정한 경우에만 켠다.
  updater:
    image: ghcr.io/devy1540/toard-updater:${TOARD_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      target: updater
    profiles: ["updater"]
    environment:
      TOARD_UPDATER_SECRET: ${TOARD_UPDATER_SECRET:-}
      TOARD_APP_URL: http://app:3000
      TOARD_COMPOSE_PROJECT_DIR: /workspace
      TOARD_COMPOSE_FILE: docker-compose.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  # 선택(profile=seed): providers·admin·비번 시드. `docker compose --profile seed run --rm seed`
  seed:
    image: ghcr.io/devy1540/toard-migrate:${TOARD_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      target: migrator
    command: ["pnpm", "seed"]
    profiles: ["seed"]
    environment:
      <<: *db-url
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # 선택(profile=clickhouse): 이벤트·집계만 CH, 메타·인증은 PG(ADR-003).
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    profiles: ["clickhouse"]
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-toard}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-toard}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-toard}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - toard-ch:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
      - ./clickhouse/users.d/toard-limits.xml:/etc/clickhouse-server/users.d/toard-limits.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  toard-pg:
  toard-ch:
