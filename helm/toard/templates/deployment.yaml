apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "toard.fullname" . }}
  labels:
    {{- include "toard.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.strategy.maxUnavailable }}
      maxSurge: {{ .Values.strategy.maxSurge }}
  selector:
    matchLabels:
      {{- include "toard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        {{- include "toard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      initContainers:
        # DB 대기 → 스키마 마이그레이션(멱등, node-pg-migrate 락) → 앱 기동
        {{- if .Values.postgres.enabled }}
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          command: ["sh", "-c", "until pg_isready -h {{ include "toard.postgresHost" . }} -U {{ .Values.postgres.auth.user }}; do sleep 2; done"]
        {{- end }}
        {{- if .Values.migrate.enabled }}
        - name: migrate
          image: "{{ .Values.image.migrate.repository }}:{{ .Values.image.migrate.tag }}"
          imagePullPolicy: {{ .Values.image.migrate.pullPolicy }}
          command: ["sh", "-c", "pnpm migrate && pnpm seed"] # 마이그레이션 + baseline(providers·pricing). admin 은 /setup.
          envFrom:
            - secretRef:
                name: {{ include "toard.secretName" . }}
            - configMapRef:
                name: {{ include "toard.fullname" . }}-config
        {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.app.repository }}:{{ .Values.image.app.tag }}"
          imagePullPolicy: {{ .Values.image.app.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: {{ include "toard.secretName" . }}
            - configMapRef:
                name: {{ include "toard.fullname" . }}-config
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 3
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 15
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.preStopDrainSeconds }}"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
