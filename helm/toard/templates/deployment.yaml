apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "toard.fullname" . }}
  labels:
    {{- include "toard.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.strategy.maxUnavailable }}
      maxSurge: {{ .Values.strategy.maxSurge }}
  selector:
    matchLabels:
      {{- include "toard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      annotations:
        toard.dev/release-completion-id: {{ include "toard.releaseCompletionId" . | quote }}
        {{- if .Values.encryption.provider }}
        checksum/toard-encryption-config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum | quote }}
        {{- end }}
      labels:
        {{- include "toard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
        {{- with .Values.serviceAccount.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "toard.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: app
          image: "{{ .Values.image.app.repository }}:{{ .Values.image.app.tag }}"
          imagePullPolicy: {{ .Values.image.app.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: {{ include "toard.secretName" . }}
            - configMapRef:
                name: {{ include "toard.fullname" . }}-config
            {{- if .Values.encryption.provider }}
            - configMapRef:
                name: {{ include "toard.fullname" . }}-encryption-config
            {{- end }}
          {{- if .Values.migrate.enabled }}
          env:
            - name: TOARD_DEPLOYMENT_ID
              value: {{ include "toard.deploymentId" . | quote }}
            - name: TOARD_RELEASE_COMPLETION_ID
              value: {{ include "toard.releaseCompletionId" . | quote }}
            - name: TOARD_EXPECTED_SCHEMA_VERSION
              value: {{ include "toard.expectedSchemaVersion" . | quote }}
          {{- end }}
          {{- with .Values.encryption.secretMounts }}
          volumeMounts:
            {{- range . }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              readOnly: true
            {{- end }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 3
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 15
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.preStopDrainSeconds }}"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.encryption.secretMounts }}
      volumes:
        {{- range . }}
        - name: {{ .name }}
          secret:
            secretName: {{ .secretName }}
            defaultMode: 0440
            items:
              {{- range .items }}
              - key: {{ .key }}
                path: {{ .path }}
              {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
