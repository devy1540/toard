{{- if .Values.migrate.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "toard.releaseReadinessSecretName" . }}
  labels:
    {{- include "toard.labels" . | nindent 4 }}
    app.kubernetes.io/component: release-readiness
type: Opaque
immutable: true
stringData:
  # 인증 credential이 아닌 release correlation nonce. 일반 env/config/log에는 노출하지 않는다.
  token: {{ randAlphaNum 48 | quote }}
{{- end }}
