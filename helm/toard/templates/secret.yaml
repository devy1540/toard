{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "toard.fullname" . }}-secrets
  labels:
    {{- include "toard.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_SECRET: {{ required "secrets.authSecret 가 필요합니다 (openssl rand -base64 33) 또는 secrets.existingSecret 사용" .Values.secrets.authSecret | quote }}
  DATABASE_URL: {{ include "toard.databaseUrl" . | quote }}
  CRON_SECRET: {{ .Values.secrets.cronSecret | quote }}
  AUTH_GITHUB_ID: {{ .Values.secrets.github.id | quote }}
  AUTH_GITHUB_SECRET: {{ .Values.secrets.github.secret | quote }}
  AUTH_GOOGLE_ID: {{ .Values.secrets.google.id | quote }}
  AUTH_GOOGLE_SECRET: {{ .Values.secrets.google.secret | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.secrets.clickhousePassword | quote }}
  BOOTSTRAP_ADMIN_EMAIL: {{ .Values.secrets.bootstrapAdmin.email | quote }}
  BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.secrets.bootstrapAdmin.password | quote }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  {{- end }}
{{- end }}
