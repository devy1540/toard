{{- if and .Values.migrate.enabled .Values.migrate.seedOnInstall }}
# 최초 설치 시 1회: providers·admin 시드. migrate 를 먼저 실행해 스키마 보장(멱등).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "toard.fullname" . }}-seed
  labels:
    {{- include "toard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        {{- include "toard.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "toard.migrationServiceAccountName" . }}
      automountServiceAccountToken: false
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          command: ["sh", "-c", "until pg_isready -h {{ include "toard.postgresHost" . }} -U {{ .Values.postgres.auth.user }}; do sleep 2; done"]
      {{- end }}
      containers:
        - name: seed
          image: "{{ .Values.image.migrate.repository }}:{{ .Values.image.migrate.tag }}"
          imagePullPolicy: {{ .Values.image.migrate.pullPolicy }}
          command: ["sh", "-c", "pnpm migrate && pnpm seed"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "toard.migrationDatabaseSecretName" . }}
                  key: {{ .Values.migrate.databaseSecret.key }}
            - name: BOOTSTRAP_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ include "toard.secretName" . }}
                  key: BOOTSTRAP_ADMIN_EMAIL
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "toard.secretName" . }}
                  key: BOOTSTRAP_ADMIN_PASSWORD
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
