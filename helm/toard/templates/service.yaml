apiVersion: v1
kind: Service
metadata:
  name: {{ include "toard.fullname" . }}
  labels:
    {{- include "toard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "toard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 3000
