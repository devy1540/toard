{{- include "toard.validateDeploymentValues" . -}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "toard.serviceAccountName" . }}
  labels:
    {{- include "toard.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if and .Values.migrate.enabled .Values.migrate.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "toard.migrationServiceAccountName" . }}
  labels:
    {{- include "toard.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
automountServiceAccountToken: false
{{- end }}
