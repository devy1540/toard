# 예시 Ingress (nginx). host·ingressClassName·TLS 를 환경에 맞게 조정.
# 수집(OTLP) 바디가 클 수 있어 proxy-body-size 를 넉넉히.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: toard
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
spec:
  ingressClassName: nginx
  rules:
    - host: toard.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: toard-app
                port:
                  number: 80
  # TLS (cert-manager 등):
  # tls:
  #   - hosts: [toard.example.com]
  #     secretName: toard-tls
