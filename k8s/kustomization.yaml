apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: toard

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml # secret.example.yaml 을 복사해 생성 (gitignored). 실제 시크릿 커밋 금지.
  - postgres.yaml # 번들 Postgres. 외부 관리형 DB 사용 시 이 파일 제거 + DATABASE_URL 만 교체.
  # migrate-job.yaml 은 기본 제외 — 마이그레이션은 deployment 의 initContainer 가 처리(중복 방지).
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# 배포 시 이미지 교체:
#   kustomize edit set image toard=REG/toard:TAG toard-migrate=REG/toard-migrate:TAG
images:
  - name: toard
    newTag: latest
  - name: toard-migrate
    newTag: latest
