# 복사해서 실제 값으로 채운 뒤 k8s/secret.yaml 로 저장 (secret.yaml 은 .gitignore).
#   cp k8s/secret.example.yaml k8s/secret.yaml  &&  vi k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: toard-secrets
type: Opaque
stringData:
  # ── 필수 ──
  AUTH_SECRET: "REPLACE_openssl_rand_base64_33" # openssl rand -base64 33
  POSTGRES_PASSWORD: "REPLACE_db_password"
  # DATABASE_URL 의 비번은 POSTGRES_PASSWORD 와 일치해야 함. 외부 DB 면 host 도 교체.
  DATABASE_URL: "postgres://toard:REPLACE_db_password@postgres:5432/toard"
  # ── 선택 ──
  CRON_SECRET: "" # cron 엔드포인트 Bearer 인증 (프로덕션 권장)
  AUTH_GITHUB_ID: ""
  AUTH_GITHUB_SECRET: ""
  AUTH_GOOGLE_ID: ""
  AUTH_GOOGLE_SECRET: ""
  CLICKHOUSE_PASSWORD: "toard"
  # 최초 admin id/pw 부트스트랩 (seed Job 에서 사용)
  BOOTSTRAP_ADMIN_EMAIL: ""
  BOOTSTRAP_ADMIN_PASSWORD: ""
