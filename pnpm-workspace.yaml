packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  protobufjs: true
  sharp: true

# Reuse dependency-graph directories across local worktrees.
# CI and Docker disable this explicitly because their stores are ephemeral.
enableGlobalVirtualStore: true

overrides:
  '@azure-rest/core-client': 2.7.0
  '@azure/abort-controller': 2.1.2
  '@azure/core-auth': 1.10.1
  '@azure/core-client': 1.10.2
  '@azure/core-paging': 1.6.2
  '@azure/core-rest-pipeline': 1.24.0
  '@azure/core-tracing': 1.3.0
  '@azure/core-util': 1.13.1
  '@azure/logger': 1.3.0
  '@typespec/ts-http-runtime': 0.3.6

# The global virtual store resolves declarations from the central package path,
# so packages that omit this type peer cannot see the workspace React types.
packageExtensions:
  next-themes@0.4.6:
    peerDependencies:
      '@types/react': '*'
  recharts@2.15.4:
    peerDependencies:
      '@types/react': '*'
