<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>toard 데모 — 전체 현황</title>
<meta name="description" content="seed:demo 합성 데이터로 채운 toard 대시보드 데모. 로그인 없이 조직·팀 사용량과 비용을 확인." />
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="../assets/app.css" />
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <g id="i-grid" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></g>
    <g id="i-award" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></g>
    <g id="i-dollar" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></g>
    <g id="i-activity" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></g>
    <g id="i-users" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></g>
    <g id="i-swap" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><line x1="21" y1="5" x2="9" y2="5"/><polyline points="7 23 3 19 7 15"/><line x1="3" y1="19" x2="15" y2="19"/></g>
    <g id="i-info" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></g>
    <g id="i-calendar" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></g>
    <g id="i-back" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></g>
  </defs>
</svg>

<div class="app">
  <aside class="side">
    <a class="brand" href="../">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 8 C 15 8, 16 16, 26 16"/><path d="M4 16 H 24"/><path d="M4 24 C 15 24, 16 16, 26 16"/><circle cx="27" cy="16" r="2.6" fill="currentColor" stroke="none"/></svg>
      toard
    </a>
    <nav>
      <a class="active" href="#"><svg viewBox="0 0 24 24"><use href="#i-grid"/></svg>전체 현황</a>
      <a href="#" onclick="showTab('ranking');return false;"><svg viewBox="0 0 24 24"><use href="#i-award"/></svg>순위</a>
    </nav>
    <div class="side-foot"><a href="../"><svg viewBox="0 0 16 16" width="12" height="12" style="vertical-align:-1px"><use href="#i-back"/></svg> 소개 페이지로</a></div>
  </aside>

  <main class="main">
    <div class="demo-banner">
      <svg viewBox="0 0 24 24"><use href="#i-info"/></svg>
      <span>데모 — <code>seed:demo</code> 합성 데이터 · 읽기 전용 정적 스냅샷. 실제 앱은 로그인·실시간 수집을 지원합니다. <a href="../">소개 페이지</a></span>
    </div>

    <div class="page-head">
      <div>
        <h1>전체 현황</h1>
        <p>전체 사용량·비용</p>
      </div>
      <span class="select"><svg viewBox="0 0 24 24"><use href="#i-calendar"/></svg>최근 5일</span>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-overview" onclick="showTab('overview')">개요</button>
      <button class="tab" id="tab-ranking" onclick="showTab('ranking')">순위</button>
    </div>

    <section id="panel-overview">
      <div class="stat-grid">
        <div class="stat"><div class="lbl"><svg viewBox="0 0 24 24"><use href="#i-dollar"/></svg>총 비용</div><div class="val" id="s-cost">—</div></div>
        <div class="stat"><div class="lbl"><svg viewBox="0 0 24 24"><use href="#i-activity"/></svg>세션</div><div class="val" id="s-sessions">—</div></div>
        <div class="stat"><div class="lbl"><svg viewBox="0 0 24 24"><use href="#i-users"/></svg>활성 사용자</div><div class="val" id="s-users">—</div></div>
        <div class="stat"><div class="lbl"><svg viewBox="0 0 24 24"><use href="#i-swap"/></svg>총 토큰</div><div class="val" id="s-tokens">—</div><div class="hint" id="s-tokens-hint"></div></div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-head"><h3>일별 비용</h3></div>
          <div class="card-body chart" id="c-daily"></div>
        </div>
        <div class="card">
          <div class="card-head"><h3>상위 사용자</h3><a href="#" onclick="showTab('ranking');return false;">전체 순위 →</a></div>
          <div class="card-body"><table><thead><tr><th>사용자</th><th class="num">비용</th></tr></thead><tbody id="t-top"></tbody></table></div>
        </div>
      </div>

      <div class="card" style="margin-top:16px;">
        <div class="card-head"><h3>모델별 사용량</h3></div>
        <div class="card-body"><table><thead><tr><th>모델</th><th class="num">세션</th><th class="num">토큰</th><th class="num">비용</th></tr></thead><tbody id="t-model"></tbody></table></div>
      </div>
    </section>

    <section id="panel-ranking" class="hidden">
      <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
        <div class="seg">
          <button id="seg-user" class="active" onclick="setScope('user')">개인</button>
          <button id="seg-team" onclick="setScope('team')">팀</button>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><h3 id="rank-title">비용 상위 개인</h3></div>
        <div class="card-body chart" id="c-rank"></div>
      </div>
      <div class="card" style="margin-top:16px;">
        <div class="card-head"><h3 id="rank-table-title">개인 순위</h3></div>
        <div class="card-body"><table><thead><tr><th class="rank">#</th><th id="rank-col">사용자</th><th class="num">세션</th><th class="num">토큰</th><th class="num">비용</th></tr></thead><tbody id="t-rank"></tbody></table></div>
      </div>
    </section>
  </main>
</div>

<script src="demo.js"></script>
</body>
</html>
